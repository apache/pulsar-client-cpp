# A single standalone broker for the scalable-topics end-to-end tests. The image
# (apachepulsar/pulsar:latest == the 5.0.0-M1 milestone) ships the scalable-topics
# controller and wire protocol; no extra broker config is needed to enable them.
version: '3'
networks:
  pulsar:
    driver: bridge
services:
  standalone:
    image: apachepulsar/pulsar:latest
    container_name: pulsar-st-standalone
    hostname: local
    restart: "no"
    networks:
      - pulsar
    environment:
      - clusterName=standalone
      - advertisedAddress=localhost
      - advertisedListeners=external:pulsar://localhost:6650
      - PULSAR_MEM=-Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m
    ports:
      - "6650:6650"
      - "8080:8080"
    command: bash -c "bin/apply-config-from-env.py conf/standalone.conf && exec bin/pulsar standalone -nss -nfw"
